<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Midnight Carbon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f16"/>
      <stop offset="50%" stop-color="#131b28"/>
      <stop offset="100%" stop-color="#07090d"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6f89b8" stop-opacity=".0"/>
      <stop offset="50%" stop-color="#6f89b8" stop-opacity=".14"/>
      <stop offset="100%" stop-color="#6f89b8" stop-opacity=".0"/>
    </linearGradient>
    <pattern id="mesh" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M0 0H22M0 0V22" stroke="#ffffff" stroke-opacity=".04" stroke-width="1"/>
      <path d="M0 22L22 0" stroke="#ffffff" stroke-opacity=".03" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#mesh)"/>
  <rect width="1600" height="900" fill="url(#beam)"/>
  <circle cx="1180" cy="220" r="250" fill="#8eb3ff" opacity=".05"/>
  <circle cx="430" cy="670" r="310" fill="#6f89b8" opacity=".05"/>
  <rect x="0" y="0" width="1600" height="900" fill="none" stroke="#ffffff" stroke-opacity=".08" stroke-width="16"/>
</svg>
