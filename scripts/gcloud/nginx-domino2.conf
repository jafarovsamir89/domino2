upstream domino2_api {
  server 127.0.0.1:3000;
  keepalive 16;
}

upstream domino2_admin {
  server 127.0.0.1:3001;
  keepalive 16;
}

upstream domino2_game {
  server 127.0.0.1:2567;
  keepalive 16;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  listen [::]:80;
  server_name gamed.simplesoft.az apid.simplesoft.az admind.simplesoft.az;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name gamed.simplesoft.az;

  # Issue a SAN certificate covering gamed.simplesoft.az, apid.simplesoft.az, admind.simplesoft.az
  # and place it under /etc/letsencrypt/live/gamed.simplesoft.az/.
  ssl_certificate /etc/letsencrypt/live/gamed.simplesoft.az/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/gamed.simplesoft.az/privkey.pem;

  location / {
    proxy_pass http://domino2_game;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name apid.simplesoft.az;

  ssl_certificate /etc/letsencrypt/live/gamed.simplesoft.az/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/gamed.simplesoft.az/privkey.pem;

  location / {
    proxy_pass http://domino2_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name admind.simplesoft.az;

  ssl_certificate /etc/letsencrypt/live/gamed.simplesoft.az/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/gamed.simplesoft.az/privkey.pem;

  location / {
    proxy_pass http://domino2_admin;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
