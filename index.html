<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telefon - Domino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f1923">
</head>
<body>
    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <!-- Language Switcher -->
        <div class="lang-switcher">
            <button class="btn btn-lang active" data-lang="az">AZ</button>
            <button class="btn btn-lang" data-lang="en">EN</button>
            <button class="btn btn-lang" data-lang="ru">RU</button>
        </div>

        <div class="start-container" style="max-height: 95vh; overflow-y: auto;">
            <div class="logo-area">
                <div class="domino-logo">
                    <div class="tile horizontal">
                        <div class="tile-half">
                            <div class="pip"></div><div class="pip hidden"></div><div class="pip hidden"></div>
                            <div class="pip hidden"></div><div class="pip"></div><div class="pip hidden"></div>
                            <div class="pip hidden"></div><div class="pip hidden"></div><div class="pip"></div>
                        </div>
                        <div class="tile-divider"></div>
                        <div class="tile-half">
                            <div class="pip"></div><div class="pip hidden"></div><div class="pip hidden"></div>
                            <div class="pip hidden"></div><div class="pip hidden"></div><div class="pip hidden"></div>
                            <div class="pip hidden"></div><div class="pip hidden"></div><div class="pip"></div>
                        </div>
                    </div>
                </div>
                <h1 class="game-title" data-i18n="game-title">TELEFON</h1>
                <p class="game-subtitle" data-i18n="game-subtitle">Azərbaycan Dominosu</p>
                <div style="font-size:0.6rem; color:var(--text-dim); margin-top:-8px; margin-bottom:10px; opacity:0.6; text-align:center;">v1.18</div>
            </div>

            <div class="settings-group">
                <label data-i18n="label-players">Oyunçular</label>
                <div class="btn-group" id="player-count-group">
                    <button class="btn btn-option active" data-value="2">2</button>
                    <button class="btn btn-option" data-value="3">3</button>
                    <button class="btn btn-option" data-value="4">4</button>
                </div>
            </div>

            <div class="settings-group">
                <label data-i18n="label-difficulty">Çətinlik</label>
                <div class="btn-group" id="difficulty-group">
                    <button class="btn btn-option" data-value="easy" data-i18n="diff-easy">Asan</button>
                    <button class="btn btn-option active" data-value="medium" data-i18n="diff-medium">Orta</button>
                    <button class="btn btn-option" data-value="hard" data-i18n="diff-hard">Çətin</button>
                </div>
            </div>

            <div class="settings-group">
                <label data-i18n="label-name">Adınız</label>
                <input type="text" id="player-name" placeholder="Adınız" maxlength="12">
            </div>

            <div class="settings-group" style="flex-direction:row;align-items:center;gap:10px;">
                <input type="checkbox" id="instant-win-setting" checked style="width:18px;height:18px;accent-color:var(--primary);">
                <label for="instant-win-setting" style="margin:0;" data-i18n="label-instant-win">35 xal = +2 raund</label>
            </div>

            <div class="settings-group">
                <label data-i18n="label-dloss">Məğlubiyyət həddi</label>
                <input type="number" id="dloss-setting" value="255" min="0" max="365">
            </div>

            <div class="rules-summary">
                <div class="rule-row">🎯 <span>365 · 3 raund</span></div>
                <div class="rule-row">🃏 <span>[3|2]</span></div>
            </div>

            <button class="btn btn-primary btn-large" id="start-game-btn" data-i18n="btn-start">Tək Oyun</button>
            
            <div style="margin-top:20px; padding-top:15px; border-top:1px solid rgba(255,255,255,0.1)">
                <div style="font-size:0.8rem; color:var(--text-dim); text-align:center; margin-bottom:10px;" data-i18n="label-wifi">Wi-Fi ilə Oyun</div>
                <div class="btn-group">
                    <button class="btn btn-action" style="flex:1;" id="host-game-btn" data-i18n="btn-host">Yarat</button>
                    <button class="btn btn-action" style="flex:1;" id="join-game-btn" data-i18n="btn-join">Qoşul</button>
                </div>
                
                <div id="multi-host-ui" style="display:none; margin-top:15px; border-top:1px solid rgba(255,255,255,0.05); padding-top:15px;">
                    <div style="text-align:center; margin-bottom:12px;">
                        <span data-i18n="placeholder-code">Otaq kodu</span>: <strong id="room-code-display" style="color:var(--accent); font-size:1.2rem; letter-spacing:2px;">...</strong>
                    </div>
                    
                    <div class="settings-group">
                        <label data-i18n="label-mode">Oyun Rejimi</label>
                        <div class="btn-group" id="multi-mode-group">
                            <button class="btn btn-option active" data-value="ffa" data-i18n="mode-ffa">Hər kəs özü üçün</button>
                            <button class="btn btn-option" data-value="team" data-i18n="mode-team">2 vs 2</button>
                        </div>
                    </div>

                    <div id="host-status" style="font-size:0.75rem; color:var(--text-dim); text-align:center; margin-top:5px;" data-i18n="host-waiting">Oyunçu gözlənilir...</div>
                    <button class="btn btn-primary" id="multi-start-btn" style="display:none; width:100%; margin-top:10px;" data-i18n="btn-multi-start">Oyuna Başla</button>
                </div>

                <div id="multi-join-ui" style="display:none; margin-top:10px; gap:6px;">
                    <input type="text" id="join-code-input" placeholder="ABC" style="width:100%; padding:8px; border-radius:6px; background:rgba(0,0,0,0.3); border:1px solid var(--glass-border); color:#fff; text-transform:uppercase;">
                    <button class="btn btn-primary" id="connect-btn">▶</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <!-- Top bar: menu + scores + info -->
        <div class="game-header">
            <button class="menu-btn" id="menu-btn" title="Меню">☰</button>
            <div class="scores-bar" id="scores-bar"></div>
            <div class="game-info">
                <span id="round-info"></span>
                <span id="boneyard-info"></span>
            </div>
        </div>

        <!-- Opponent hands (Top, Left, Right) -->
        <div id="opp-top" class="opp-container top"></div>
        <div id="opp-left" class="opp-container side left"></div>
        <div id="opp-right" class="opp-container side right"></div>

        <!-- Board -->
        <div class="board-container" id="board-container">
            <div class="board" id="board"></div>
        </div>

        <!-- Boneyard visual -->
        <div class="boneyard-visual" id="boneyard-visual"></div>

        <!-- Message -->
        <div class="message-area" id="message-area"></div>
        
        <!-- Player hand -->
        <div class="hand-container">
            <div class="hand" id="player-hand"></div>
        </div>

        <!-- Action bar -->
        <div class="action-bar">
            <button class="btn btn-action" id="draw-btn" disabled data-i18n="btn-draw">БАЗАР</button>
            <button class="btn btn-action" id="pass-btn" disabled data-i18n="btn-pass">ПАС</button>
        </div>
    </div>

    <!-- Menu Overlay -->
    <div id="menu-screen" class="screen overlay">
        <div class="overlay-content menu-panel">
            <h2 data-i18n="label-difficulty">Tənzimləmələr</h2>
            <button class="btn btn-menu" id="menu-resume" data-i18n="menu-resume">Davam et</button>
            <button class="btn btn-menu" id="menu-newgame" data-i18n="menu-new">Yeni Oyun</button>
            <button class="btn btn-menu" id="menu-quit" data-i18n="menu-quit">Çıxış</button>
        </div>
    </div>

    <!-- Round End Screen -->
    <div id="round-end-screen" class="screen overlay">
        <div class="overlay-content">
            <h2 id="round-end-title"></h2>
            <div id="round-end-details"></div>
            <button class="btn btn-primary" id="next-round-btn" data-i18n="round-end-next">Davam</button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen overlay">
        <div class="overlay-content">
            <h2 id="game-over-title"></h2>
            <div id="game-over-details"></div>
            <button class="btn btn-primary" id="new-game-btn">Новая игра</button>
        </div>
    </div>

    <script src="js/vendor/colyseus.js"></script>
    <script src="js/network.js"></script>
    <script type="module" src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
