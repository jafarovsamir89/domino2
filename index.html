<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telefon - Domino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f1923">
</head>
<body>
    <div id="start-screen" class="screen active">
        <div class="lang-switcher">
            <button class="btn btn-lang active" data-lang="az">AZ</button>
            <button class="btn btn-lang" data-lang="en">EN</button>
            <button class="btn btn-lang" data-lang="ru">RU</button>
        </div>

        <div class="start-shell">
            <section class="start-hero">
                <div class="brand-lockup">
                    <div class="domino-logo">
                        <div class="tile horizontal">
                            <div class="tile-half">
                                <div class="pip"></div><div class="pip hidden"></div><div class="pip hidden"></div>
                                <div class="pip hidden"></div><div class="pip"></div><div class="pip hidden"></div>
                                <div class="pip hidden"></div><div class="pip hidden"></div><div class="pip"></div>
                            </div>
                            <div class="tile-divider"></div>
                            <div class="tile-half">
                                <div class="pip"></div><div class="pip hidden"></div><div class="pip hidden"></div>
                                <div class="pip hidden"></div><div class="pip hidden"></div><div class="pip hidden"></div>
                                <div class="pip hidden"></div><div class="pip hidden"></div><div class="pip"></div>
                            </div>
                        </div>
                    </div>

                    <div class="brand-copy">
                        <h1 class="game-title" data-i18n="game-title">Domino (Telefon)</h1>
                    </div>
                </div>

            </section>

            <div class="start-actions">
                <button class="btn btn-primary btn-large" id="open-solo-modal-btn" data-i18n="btn-solo">Solo play</button>
                <button class="btn btn-action btn-large" id="open-online-modal-btn" data-i18n="btn-online">Online</button>
            </div>
        </div>

        <div id="solo-modal" class="modal-backdrop">
            <section class="modal-card">
                <div class="modal-header">
                    <div>
                        <h2 data-i18n="solo-modal-title">Solo play</h2>
                        <p class="modal-desc" data-i18n="solo-modal-desc">Pick difficulty, players, and match rules.</p>
                    </div>
                </div>

                <div class="settings-grid">
                    <div class="settings-group">
                        <label data-i18n="label-players">Players</label>
                        <div class="btn-group" id="player-count-group">
                            <button class="btn btn-option active" data-value="2">2</button>
                            <button class="btn btn-option" data-value="3">3</button>
                            <button class="btn btn-option" data-value="4">4</button>
                        </div>
                    </div>

                    <div class="settings-group">
                        <label data-i18n="label-difficulty">Difficulty</label>
                        <div class="btn-group" id="difficulty-group">
                            <button class="btn btn-option" data-value="easy" data-i18n="diff-easy">Easy</button>
                            <button class="btn btn-option active" data-value="medium" data-i18n="diff-medium">Medium</button>
                            <button class="btn btn-option" data-value="hard" data-i18n="diff-hard">Hard</button>
                        </div>
                    </div>

                    <div class="settings-group field-span-2">
                        <label data-i18n="label-name">Your name</label>
                        <input type="text" id="player-name" data-i18n="placeholder-player-name" placeholder="Enter your name" maxlength="12" required>
                    </div>

                    <div class="rule-grid field-span-2">
                        <div class="rule-title" data-i18n="label-dloss">Loss threshold</div>
                        <div class="rule-bottom">
                            <input type="text" id="dloss-setting" class="loss-input" value="255" inputmode="numeric" pattern="[0-9]*" maxlength="3">
                            <label class="toggle-card" for="instant-win-setting">
                                <input type="checkbox" id="instant-win-setting" checked>
                                <span class="toggle-copy">
                                    <strong data-i18n="label-instant-win">35 pts = +2 rounds</strong>
                                </span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="modal-footer modal-footer-split">
                    <button class="btn btn-primary btn-large modal-primary-btn" id="start-game-btn" data-i18n="btn-solo-start">Start solo game</button>
                    <button class="btn btn-menu modal-close-btn modal-secondary-btn" id="solo-modal-close" data-i18n="modal-close">Close</button>
                </div>
            </section>
        </div>

        <div id="online-modal" class="modal-backdrop">
            <section class="modal-card modal-card-wide">
                <div class="modal-header">
                    <div>
                        <p class="section-kicker" data-i18n="online-modal-kicker">Online</p>
                        <h2 data-i18n="online-modal-title">Online room</h2>
                        <p class="modal-desc" data-i18n="online-modal-desc">Create a room, add bots, or join with a code.</p>
                    </div>
                    <button class="btn btn-menu modal-close-btn" id="online-modal-close" data-i18n="modal-close">Close</button>
                </div>

                <div class="settings-grid compact-grid">
                    <div class="settings-group">
                        <label data-i18n="label-name">Your name</label>
                        <input type="text" id="player-name-online" data-i18n="placeholder-player-name" placeholder="Enter your name" maxlength="12" required>
                    </div>

                    <div class="settings-group">
                        <label data-i18n="label-online-players">Room size</label>
                        <div class="btn-group" id="online-player-count-group">
                            <button class="btn btn-option active" data-value="2">2</button>
                            <button class="btn btn-option" data-value="3">3</button>
                            <button class="btn btn-option" data-value="4">4</button>
                        </div>
                    </div>

                    <div class="settings-group">
                        <label data-i18n="label-ai-slots">AI slots</label>
                        <input type="number" id="online-ai-count" value="0" min="0" max="2">
                    </div>

                    <div class="settings-group">
                        <label data-i18n="label-mode">Game mode</label>
                        <div class="btn-group" id="multi-mode-group">
                            <button class="btn btn-option active" data-value="ffa" data-i18n="mode-ffa">Free for all</button>
                            <button class="btn btn-option" data-value="team" data-i18n="mode-team">2 vs 2</button>
                        </div>
                    </div>

                    <div class="settings-group field-span-2">
                        <div id="online-player-summary" class="room-summary"></div>
                    </div>
                </div>

                <div class="multiplayer-actions btn-group">
                    <button class="btn btn-action btn-strong" id="host-game-btn" data-i18n="btn-host">Create room</button>
                    <button class="btn btn-action" id="join-game-btn" data-i18n="btn-join">Join room</button>
                </div>

                <div id="multi-host-ui" class="multi-panel">
                    <div class="room-code-line">
                        <span data-i18n="online-room-code">Room code</span>
                        <div class="room-code-actions">
                            <strong id="room-code-display" class="room-code-value">....</strong>
                            <button class="btn btn-menu room-copy-btn" id="copy-room-code-btn" data-i18n="online-room-copy">Copy</button>
                        </div>
                    </div>
                    <div id="room-player-count-display" class="room-count">1 / 2</div>
                    <div id="room-player-list" class="room-player-list"></div>
                    <div id="host-status" class="multi-status" data-i18n="online-room-status-created">Creating room...</div>
                    <button class="btn btn-menu" id="host-cancel-btn" data-i18n="online-room-cancel">Cancel</button>
                </div>

                <div id="multi-join-ui" class="multi-panel">
                    <div id="join-status" class="multi-status" data-i18n="online-room-join-hint">Enter a room code</div>
                    <input type="text" id="join-code-input" data-i18n="online-room-code-placeholder" placeholder="ABCD" maxlength="8">
                    <div class="btn-group">
                        <button class="btn btn-primary" id="connect-btn" data-i18n="btn-join">Join</button>
                        <button class="btn btn-menu" id="join-cancel-btn" data-i18n="online-room-back">Back</button>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-header">
            <button class="menu-btn" id="menu-btn" data-i18n="menu-open" title="Menyu">≡</button>
            <div class="scores-bar" id="scores-bar"></div>
            <div class="game-info">
                <span id="round-info"></span>
                <span id="boneyard-info"></span>
            </div>
        </div>

        <div id="opp-top" class="opp-container top"></div>
        <div id="opp-left" class="opp-container side left"></div>
        <div id="opp-right" class="opp-container side right"></div>

        <div class="board-container" id="board-container">
            <div class="board" id="board"></div>
            <div class="reaction-stage" id="reaction-stage" aria-hidden="true"></div>
        </div>

        <div class="boneyard-visual" id="boneyard-visual"></div>
        <div class="message-area" id="message-area"></div>

        <div class="hand-container">
            <div class="hand" id="player-hand"></div>
        </div>

        <div class="action-bar">
            <button class="btn btn-action" id="draw-btn" disabled data-i18n="btn-draw">BAZAR</button>
            <button class="btn btn-action" id="pass-btn" disabled data-i18n="btn-pass">PAS</button>
            <div class="reaction-slot">
                <button class="reaction-fab" id="reaction-btn" type="button" aria-haspopup="true" aria-expanded="false" title="Reactions"></button>
                <div class="reaction-picker" id="reaction-picker" aria-hidden="true"></div>
            </div>
        </div>
    </div>

    <div id="menu-screen" class="screen overlay">
        <div class="overlay-content menu-panel">
            <h2 data-i18n="menu-title">Menyu</h2>
            <button class="btn btn-menu" id="menu-resume" data-i18n="menu-resume">Davam et</button>
            <button class="btn btn-menu" id="menu-newgame" data-i18n="menu-new">Yeni oyun</button>
            <button class="btn btn-menu" id="menu-quit" data-i18n="menu-quit">Çıxış</button>
        </div>
    </div>

    <div id="round-end-screen" class="screen overlay">
        <div class="overlay-content">
            <h2 id="round-end-title"></h2>
            <div id="round-end-details"></div>
            <button class="btn btn-primary" id="next-round-btn" data-i18n="round-end-next">Davam et</button>
        </div>
    </div>

    <div id="game-over-screen" class="screen overlay">
        <div class="overlay-content">
            <h2 id="game-over-title"></h2>
            <div id="game-over-details"></div>
            <button class="btn btn-primary" id="new-game-btn" data-i18n="new-game-btn">Yeni oyun</button>
        </div>
    </div>

    <script src="js/vendor/colyseus.js"></script>
    <script src="js/network.js"></script>
    <script type="module" src="js/app.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js").catch(() => {});
        }
    </script>
</body>
</html>
